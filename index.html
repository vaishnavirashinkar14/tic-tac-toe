<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 5px;
    justify-content: center;
    margin: 20px;
  }
  .cell {
    width: 100px;
    height: 100px;
    font-size: 40px;
    border: 2px solid black;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<!-- Player Setup -->
<div>
  <input type="text" id="player1Name" placeholder="Player 1 Name">
  <select id="player1Symbol">
    <option value="X">X</option>
    <option value="O">O</option>
  </select>

  <br><br>

  <input type="text" id="player2Name" placeholder="Player 2 Name">
  <select id="player2Symbol">
    <option value="O">O</option>
    <option value="X">X</option>
  </select>

  <br><br>
  <button onclick="startGame()">Start Game</button>
</div>

<h2 id="message"></h2>

<div class="board" id="board">
  <div class="cell" data-index="0"></div>
  <div class="cell" data-index="1"></div>
  <div class="cell" data-index="2"></div>
  <div class="cell" data-index="3"></div>
  <div class="cell" data-index="4"></div>
  <div class="cell" data-index="5"></div>
  <div class="cell" data-index="6"></div>
  <div class="cell" data-index="7"></div>
  <div class="cell" data-index="8"></div>
</div>

<button onclick="restartGame()">Restart</button>

<script>
let board = ["","","","","","","","",""];
let currentPlayer;
let player1 = {name:"", symbol:""};
let player2 = {name:"", symbol:""};
let gameActive = false;

const message = document.getElementById("message");
const cells = document.querySelectorAll(".cell");

function startGame() {
  player1.name = document.getElementById("player1Name").value || "Player 1";
  player2.name = document.getElementById("player2Name").value || "Player 2";

  player1.symbol = document.getElementById("player1Symbol").value;
  player2.symbol = document.getElementById("player2Symbol").value;

  if (player1.symbol === player2.symbol) {
    alert("Both players cannot have same symbol!");
    return;
  }

  currentPlayer = player1;
  gameActive = true;
  message.textContent = `${currentPlayer.name}'s turn (${currentPlayer.symbol})`;

  restartGame();
}

function cellClicked(e) {
  const index = e.target.dataset.index;

  if (board[index] !== "" || !gameActive) return;

  board[index] = currentPlayer.symbol;
  e.target.textContent = currentPlayer.symbol;

  checkWinner();

  if (gameActive) {
    currentPlayer = currentPlayer === player1 ? player2 : player1;
    message.textContent = `${currentPlayer.name}'s turn (${currentPlayer.symbol})`;
  }
}

function checkWinner() {
  const combos = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  for (let [a,b,c] of combos) {
    if (board[a] && board[a] === board[b] && board[a] === board[c]) {
      message.textContent = `${currentPlayer.name} wins! 🎉`;
      gameActive = false;
      return;
    }
  }

  if (!board.includes("")) {
    message.textContent = "It's a Tie!";
    gameActive = false;
  }
}

function restartGame() {
  board = ["","","","","","","","",""];
  cells.forEach(cell => cell.textContent = "");
  if (gameActive)
    message.textContent = `${currentPlayer.name}'s turn (${currentPlayer.symbol})`;
}

cells.forEach(cell => cell.addEventListener("click", cellClicked));
</script>

</body>
</html>
